<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>Register</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .register-card {
            background-color: #ffffff;
            padding: 2.5rem;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 400px;
        }
        h2 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 1.5rem;
        }
        .form-group {
            margin-bottom: 1.2rem;
        }
        input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid #cdd5e1;
            border-radius: 6px;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus {
            border-color: #2ecc71;
        }
        button {
            width: 100%;
            padding: 0.75rem;
            background-color: #2ecc71;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #27ae60;
        }
        .footer-text {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.9rem;
            color: #7f8c8d;
        }
        .footer-text a {
            color: #2ecc71;
            text-decoration: none;
            font-weight: 600;
        }
        .footer-text a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="register-card">
    <h2>Buat Akun</h2>

    <form th:action="@{/register}" method="post" th:object="${request}">
        <div class="form-group">
            <input type="text" th:field="*{username}" placeholder="Username" required>
        </div>

        <div class="form-group">
            <input type="password" th:field="*{password}" placeholder="Password" required>
        </div>

        <div class="form-group">
            <input type="text" th:field="*{nama}" placeholder="Nama Lengkap" required>
        </div>

        <div class="form-group">
            <input type="text" th:field="*{alamat}" placeholder="Alamat" required>
        </div>

        <button type="submit">Register</button>
    </form>

    <div class="footer-text">
        <p>Sudah punya akun? <a th:href="@{/login}">Login disini</a></p>
    </div>
</div>

</body>
</html>
